<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
:root {
  --color-primary: #0066cc;
  --color-success: #228B22;
  --color-danger: #cc0000;
  --color-text: #333;
  --color-text-muted: #666;
  --color-text-faint: #999;
  --color-border: #ddd;
  --color-bg-subtle: #f0f0f0;
  --color-bg-panel: #f8f8f8;
  --radius-sm: 3px;
  --radius-md: 4px;
}

/* Global interaction styles */
button:hover:not(:disabled) {
  filter: brightness(0.92);
}

button:active:not(:disabled) {
  transform: scale(0.97);
}

button:focus-visible {
  outline: 2px solid var(--color-primary);
  outline-offset: 2px;
}

input:focus-visible {
  outline: 2px solid var(--color-primary);
  outline-offset: 1px;
}

/* Directory row hover/focus - attribute-scoped for safety */
tr[data-dir-row="true"]:hover {
  background-color: var(--color-bg-panel);
}

tr[data-dir-row="true"]:focus-visible {
  outline: 2px solid var(--color-primary);
  outline-offset: -2px;
}
    </style>
    <title>NVR Backup Manager</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
